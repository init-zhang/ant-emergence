<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="./ants.js" defer></script>
        <title>Ants</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: scroll;
            }

            canvas {
                display: block;
            }

            #controls {
                position: absolute;
                top: 0;
                left: 0;
                background-color: rgba(255, 255, 255, 0.5);
            }
        </style>
    </head>
    <body>
        <div id="controls">
            <details>
                <summary>Controls - <span id="performance"></span></summary>
                <hr />
                <div>
                    <input type="range" id="homePheromoneDistance" name="homePheromoneDistance" min="0" max="400" step="20" />
                    (<span id="homePheromoneDistanceValue">0</span>)
                    <label for="homePheromoneDistance">Home Pheromone Distance</label>
                </div>

                <div>
                    <input type="range" id="homePheromoneFrequency" name="homePheromoneFrequency" min="0" max="40" step="1" />
                    (<span id="homePheromoneFrequencyValue">0</span>)
                    <label for="homePheromoneFrequency">Home Pheromone Frequency</label>
                </div>

                <div>
                    <input type="range" id="homePheromoneLifespan" name="homePheromoneLifespan" min="0" max="4000" step="100" />
                    (<span id="homePheromoneLifespanValue">0</span>)
                    <label for="homePheromoneLifespan">Home Pheromone Lifespan</label>
                </div>

                <div>
                    <input type="range" id="foodPheromoneDistance" name="foodPheromoneDistance" min="0" max="400" step="20" />
                    (<span id="foodPheromoneDistanceValue">0</span>)
                    <label for="foodPheromoneDistance">Food Pheromone Distance</label>
                </div>

                <div>
                    <input type="range" id="foodPheromoneFrequency" name="foodPheromoneFrequency" min="0" max="40" step="1" />
                    (<span id="foodPheromoneFrequencyValue">0</span>)
                    <label for="foodPheromoneFrequency">Food Pheromone Frequency</label>
                </div>

                <div>
                    <input type="range" id="foodPheromoneLifespan" name="foodPheromoneLifespan" min="0" max="4000" step="100" />
                    (<span id="foodPheromoneLifespanValue">0</span>)
                    <label for="foodPheromoneLifespan">Food Pheromone Lifespan</label>
                </div>

                <div>
                    <input type="range" id="maxVelocity" name="maxVelocity" min="1" max="10" step="1" />
                    (<span id="maxVelocityValue">0</span>)
                    <label for="maxVelocity">Max Velocity</label>
                </div>

                <div>
                    <input type="range" id="lineMultiplier" name="lineMultiplier" min="0" max="20" step="1" />
                    (<span id="lineMultiplierValue">0</span>)
                    <label for="lineMultiplier">Line Multiplier</label>
                </div>

                <div>
                    <input type="range" id="trail" name="trail" min="0" max="0.9" step="0.1" />
                    (<span id="trailValue">0</span>)
                    <label for="trail">Trail</label>
                </div>

                <div>
                    <input type="button" id="toggle" name="toggle" value="Pause" />
                    <input type="button" id="restart" name="restart" value="Restart" />
                    <input type="number" id="ants" name="ants" value="100" min="0" /><label for="ants">Ants</label>
                </div>

                <hr />

                <div>
                    <input type="checkbox" id="toggleTrail" name="toggleTrail" />
                    <label for="toggleTrail">Show trails</label>
                    <input type="checkbox" id="toggleFOV" name="toggleFOV" />
                    <label for="toggleFOV">Show FOVs</label>
                </div>

            </details>
        </div>
        <canvas width="500" height="500" id="canvas"></canvas>
    </body>
</html>
